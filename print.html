<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek's Xerox Shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #1d4ed8; }
        input[type="file"] { margin: 20px 0; width: 100%; }
        #adminArea { display: none; width: 100%; max-width: 900px; margin-top: 20px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .price-tag { font-size: 2.5rem; color: #1e293b; margin: 15px 0; font-weight: 800; }
        .view-btn { background: #2563eb; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: 5px; }
        .done-btn { background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="card" id="userUI">
    <h2 style="margin-bottom:5px;">🖨️ Abhishek's Xerox</h2>
    <p style="color:#64748b;">Fast & Secure Cloud Printing</p>
    <hr style="border: 0.5px solid #eee; margin: 20px 0;">
    <p>Rate: <b>₹5 per page</b></p>
    <input type="file" id="fileInput" accept=".pdf,image/*">
    <button class="btn" onclick="handleUpload()">Upload & Get Price</button>
    <div id="status" style="margin-top:15px; color:#2563eb; font-weight: 600;"></div>
</div>

<div id="adminArea">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>📋 Live Print Queue</h2>
        <span style="background:#dcfce7; color:#166534; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:bold;">SHOP OPEN</span>
    </div>
    <table>
        <thead>
            <tr>
                <th>Job ID</th>
                <th>Pages</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="queueBody"></tbody>
    </table>
</div>

<script>
    // Your verified Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyA_tUfBWwwKr9gBkVW2wYEEx_gzv2zAfkE",
        authDomain: "abhishek-s-xerox-shop.firebaseapp.com",
        projectId: "abhishek-s-xerox-shop",
        storageBucket: "abhishek-s-xerox-shop.firebasestorage.app",
        messagingSenderId: "121642464695",
        appId: "1:121642464695:web:f8ef68ad367f505b40e432"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    async function handleUpload() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Please select a file first!");
        
        document.getElementById('status').innerText = "Processing file...";
        let pages = 1;

        // If it's a PDF, count pages. If it's an image, count as 1.
        if (file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                pages = pdf.numPages;
                uploadFile(file, pages);
            };
            reader.readAsArrayBuffer(file);
        } else {
            uploadFile(file, 1);
        }
    }

    async function uploadFile(file, pages) {
        const total = pages * 5;
        const jobID = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('status').innerText = "Uploading to Cloud...";

        try {
            const fileRef = storage.ref('prints/' + jobID + "_" + file.name);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();

            await db.collection("orders").add({
                jobID, name: file.name, pages, total, url,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('userUI').innerHTML = `
                <div style="color:#1e293b">
                    <h3 style="color:#10b981">✅ Ready to Print!</h3>
                    <p>Tell the counter your Job ID:</p>
                    <h2 style="background:#f1f5f9; padding:10px; border-radius:10px; display:inline-block;">#${jobID}</h2>
                    <div class="price-tag">₹${total}</div>
                    <p style="font-size:14px; color:#64748b;">Please pay cash and collect your prints.</p>
                    <button class="btn" style="background:#64748b" onclick="location.reload()">Upload Another</button>
                </div>`;
        } catch (error) {
            alert("Error: Please check if Firebase Rules are set to 'true'");
            console.error(error);
        }
    }

    // ADMIN PANEL LOGIC
    if(window.location.search.includes('view=admin')) {
        document.getElementById('userUI').style.display = 'none';
        document.getElementById('adminArea').style.display = 'block';

        db.collection("orders").orderBy("time", "desc").onSnapshot(snap => {
            const body = document.getElementById('queueBody');
            body.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                body.innerHTML += `
                    <tr>
                        <td><b>#${data.jobID}</b><br><small style="color:#94a3b8">${data.name.substring(0,15)}...</small></td>
                        <td>${data.pages}</td>
                        <td style="color:#10b981; font-weight:bold;">₹${data.total}</td>
                        <td>
                            <button class="view-btn" onclick="window.open('${data.url}', '_blank')">👁️ View File</button>
                            <button class="done-btn" onclick="deleteJob('${doc.id}', '${data.jobID}_${data.name}')">✅ Done</button>
                        </td>
                    </tr>`;
            });
        });
    }

    async function deleteJob(id, fileName) {
        if(confirm("Mark as printed and delete file?")) {
            await db.collection("orders").doc(id).delete();
            await storage.ref('prints/' + fileName).delete();
        }
    }
</script>
</body>
</html>
