<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek's Xerox Shop</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input[type="file"] { margin: 20px 0; width: 100%; }
        #adminArea { display: none; width: 100%; max-width: 800px; margin-top: 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .price-display { font-size: 2.5rem; color: #1e293b; margin: 15px 0; font-weight: 800; }
    </style>
</head>
<body>

<div class="card" id="userUI">
    <h2>🖨️ Abhishek's Xerox</h2>
    <p>Rate: ₹5 per page</p>
    <input type="file" id="fileInput" accept=".pdf">
    <button class="btn" onclick="handleUpload()">Upload & Get Price</button>
    <div id="status" style="margin-top:15px; color:#666;"></div>
</div>

<div id="adminArea">
    <h2>Live Print Queue (Admin)</h2>
    <table>
        <thead>
            <tr><th>Job ID</th><th>Pages</th><th>Amount</th><th>Action</th></tr>
        </thead>
        <tbody id="queueBody"></tbody>
    </table>
</div>

<script>
    // Your exact Firebase Config from the photo
    const firebaseConfig = {
        apiKey: "AIzaSyA_tUfBWwwKr9gBkVW2wYEEx_gzv2zAfkE",
        authDomain: "abhishek-s-xerox-shop.firebaseapp.com",
        projectId: "abhishek-s-xerox-shop",
        storageBucket: "abhishek-s-xerox-shop.firebasestorage.app",
        messagingSenderId: "121642464695",
        appId: "1:121642464695:web:f8ef68ad367f505b40e432"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    async function handleUpload() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Please select a PDF file!");
        
        document.getElementById('status').innerText = "Reading pages...";
        
        const reader = new FileReader();
        reader.onload = async function() {
            const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            const pages = pdf.numPages;
            const total = pages * 5; // Updated price: ₹5
            const jobID = Math.floor(1000 + Math.random() * 9000);

            document.getElementById('status').innerText = "Uploading...";

            // Upload to Storage
            const fileRef = storage.ref('prints/' + jobID + "_" + file.name);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();

            // Save to Firestore
            await db.collection("orders").add({
                jobID, name: file.name, pages, total, url,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('userUI').innerHTML = `
                <div style="color:green">
                    <h3>✅ Upload Successful!</h3>
                    <p>Job ID: <b>#${jobID}</b></p>
                    <div class="price-display">₹${total}</div>
                    <p>Please pay cash at the counter to print.</p>
                    <button class="btn" style="background:#64748b" onclick="location.reload()">Upload Another</button>
                </div>`;
        };
        reader.readAsArrayBuffer(file);
    }

    // Admin Dashboard Logic
    if(window.location.search.includes('view=admin')) {
        document.getElementById('userUI').style.display = 'none';
        document.getElementById('adminArea').style.display = 'block';

        db.collection("orders").orderBy("time", "desc").onSnapshot(snap => {
            const body = document.getElementById('queueBody');
            body.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                body.innerHTML += `
                    <tr>
                        <td>#${data.jobID}</td>
                        <td>${data.pages}</td>
                        <td><b>₹${data.total}</b></td>
                        <td>
                            <a href="${data.url}" target="_blank" style="color:blue">Open File</a> | 
                            <button onclick="deleteJob('${doc.id}', '${data.jobID}_${data.name}')">Finish</button>
                        </td>
                    </tr>`;
            });
        });
    }

    async function deleteJob(id, fileName) {
        if(confirm("Confirm payment received and file printed?")) {
            await db.collection("orders").doc(id).delete();
            await storage.ref('prints/' + fileName).delete();
        }
    }
</script>
</body>
</html>
